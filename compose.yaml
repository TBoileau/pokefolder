services:
  postgres:
    container_name: pokefolder-postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: pokefolder
      POSTGRES_PASSWORD: pokefolder
      POSTGRES_DB: pokefolder
    ports:
      - "60010:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokefolder -d pokefolder"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    container_name: pokefolder-rabbitmq
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: pokefolder
      RABBITMQ_DEFAULT_PASS: pokefolder
    ports:
      - "60011:5672"
      - "60012:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
