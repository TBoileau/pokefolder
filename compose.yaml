services:
  postgres:
    container_name: pokefolder-postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: pokefolder
      POSTGRES_PASSWORD: pokefolder
      POSTGRES_DB: pokefolder
    ports:
      - "60010:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
