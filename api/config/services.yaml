# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    pokefolder.catalog.languages: ['en', 'fr']

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Bind the TCGdex catalog provider to the SDK-backed implementation.
    App\Service\Catalog\Provider\TCGdexProvider: '@App\Service\Catalog\Provider\SDKTCGdexProvider'

    # The BinderSlotRepository implements the lookup interface used by the placement service.
    App\Service\Binder\BinderSlotLookupInterface: '@App\Repository\BinderSlotRepository'

    # And the inventory surface used by the placement suggester.
    App\Service\Binder\BinderInventoryInterface: '@App\Repository\BinderSlotRepository'

    # Custom collection extension: adds ?placed=true|false on OwnedCard.
    App\Api\Doctrine\PlacedFilterExtension:
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }

    # Custom collection extension: adds ?search=foo on Card and OwnedCard.
    App\Api\Doctrine\CardSearchExtension:
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }

    # TCGdex SDK client built by our factory (so we control its PSR slots).
    TCGdex\TCGdex:
        factory: ['@App\Service\Catalog\Provider\TCGdexClientFactory', 'create']
