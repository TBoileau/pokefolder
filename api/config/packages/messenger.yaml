framework:
    messenger:
        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            sync: 'sync://'

        routing:
            App\UseCase\Catalog\SyncAll\Input: async
            App\UseCase\Catalog\SyncSeries\Input: async
            App\UseCase\Catalog\SyncSets\Input: async
            App\UseCase\Catalog\SyncCards\Input: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
