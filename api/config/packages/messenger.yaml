framework:
    messenger:
        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            sync: 'sync://'

        routing:
            # Route your message classes to the transports here, e.g.:
            # 'App\Message\YourMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
